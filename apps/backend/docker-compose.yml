services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: registry_lite
    ports:
      - "3032:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d registry_lite"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
